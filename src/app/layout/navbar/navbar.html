<header class="navbar">
  <div class="navbar-inner">
    <a class="brand" routerLink="/overview" aria-label="NeuroFlow 3D overview">
      <span class="brand-mark"></span>
      <span>
        <strong>NeuroFlow 3D</strong>
        <small>Interactive brain signal simulator</small>
      </span>
    </a>

    <nav aria-label="Primary navigation">
      @for (link of links; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{ link.label }}</a>
      }
    </nav>
  </div>
</header>
