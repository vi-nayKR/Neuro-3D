<section class="timeline glass-card" [attr.aria-label]="'Simulation timeline' | translate">
  <div class="progress-track" aria-hidden="true">
    <div class="progress-fill" [style.width.%]="((progress$ | async) ?? 0) * 100"></div>
  </div>

  <div class="steps" #scroller>
    @for (step of timeline$ | async; track step.id) {
      <article
        class="timeline-step"
        role="button"
        tabindex="0"
        [class.active]="step.status === 'active'"
        [class.completed]="step.status === 'completed'"
        [attr.aria-label]="('Go to step' | translate) + ' ' + step.order + ': ' + (step.title | translate)"
        (click)="simulation.goToStep($index)"
        (keydown.enter)="simulation.goToStep($index)"
        (keydown.space)="$event.preventDefault(); simulation.goToStep($index)"
      >
        <span class="number">
          @if (step.status === 'completed') {
            <svg viewBox="0 0 12 12" width="11" height="11" aria-hidden="true">
              <path d="M2 6.2 5 9l5-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          } @else {
            {{ step.order }}
          }
        </span>
        <div>
          <strong>{{ step.title | translate }}</strong>
          <p>{{ step.description | translate }}</p>
          <small>{{ (step.status === 'active' ? 'now' : step.status === 'completed' ? 'done' : 'next') | translate }}</small>
        </div>
      </article>
    }
  </div>
</section>
